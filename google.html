<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Search Concept</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* GANTI WALLPAPER DI SINI */
      background: #121212 url('https://picsum.photos/1920/1080') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    /* Overlay gelap tipis agar elemen di tengah tetap kontras */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 720px;
      padding: 0 20px;
    }

    /* Logo Container */
    .logo-box {
      background-color: #2d2d2d;
      border-radius: 20px;
      padding: 20px 40px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .logo-text {
      font-size: 50px;
      font-weight: bold;
      /* Efek Gradasi pada Logo */
      background: linear-gradient(135deg, #a855f7, #ec4899, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    /* Search Bar Container */
    .search-bar {
      width: 100%;
      background: #ffffff;
      height: 48px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .search-icon {
      color: #70757a;
      margin-right: 12px;
      display: flex;
      align-items: center;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #202124;
      background: transparent;
    }

    .actions-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .action-icon {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
    }

    /* AI Mode Button */
    .ai-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background-color: #f1f3f4;
      border: 1px solid #dadce0;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: bold;
      color: #3c4043;
      cursor: pointer;
      transition: background 0.2s;
    }

    .ai-btn:hover {
      background-color: #e8eaed;
    }

    /* Shortcut Add Button */
    .add-shortcut {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .shortcut-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    .shortcut-icon:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Google Logo Box -->
    <div class="logo-box">
      <div class="logo-text">Google</div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <!-- Search Icon (SVG) -->
      <div class="search-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>

      <input type="text" class="search-input" placeholder="Telusuri Google atau ketik URL">

      <!-- Right Controls -->
      <div class="actions-right">
        <!-- Mic Icon -->
        <div class="action-icon" title="Telusuri dengan suara">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#4285F4">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </div>
        <!-- Lens Icon -->
        <div class="action-icon" title="Telusuri dengan gambar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#EA4335">
            <path d="M12 15c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"/>
            <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
          </svg>
        </div>
        <!-- Mode AI Button -->
        <button class="ai-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
          </svg>
          Mode AI
        </button>
      </div>
    </div>

    <!-- Tambahkan Pintasan -->
    <div class="add-shortcut">
      <div class="shortcut-icon">+</div>
      <span>Tambahkan pint...</span>
    </div>
  </div>

</body>
</html>
